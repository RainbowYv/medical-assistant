version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: medical_assistant-chat-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 123456
      MONGO_INITDB_DATABASE: medical_assistant_chat_db
    ports:
      - "27017:27017"
    volumes:
      - ./mongoDB:/data/db

  mysql:
    image: mysql:8.0
    container_name: medical-assistant-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: medical_assistant
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - ./mysql:/var/lib/mysql
      # 挂载 sql 目录，MySQL 启动时会自动运行里面的 .sql 文件
      - ./sql:/docker-entrypoint-initdb.d

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_server
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant/storage:/qdrant/storage
    environment:
      - TZ=Asia/Shanghai
      - QDRANT__TELEMETRY_DISABLED=true
      - QDRANT__LOG_LEVEL=INFO
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: always